apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: ztp-clusters
  namespace: ztp
spec:
  destination:
    namespace: ztp
    server: https://kubernetes.default.svc
  # project here should match the one created during argo install
  project: cluster-app-project
  source:
    path: clusters/
    repoURL: {{ .Values.mgmt.gitops.repoURL }}
    targetRevision: {{ .Values.mgmt.gitops.targetRevision }}
  ignoreDifferences: # recommended way to allow ACM controller to manage its fields. alternative approach documented below (1)
    - group: cluster.open-cluster-management.io
      kind: ManagedCluster
      managedFieldsManagers:
        - controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - RespectIgnoreDifferences=true

